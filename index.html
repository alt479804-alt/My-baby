<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 Cute Test 🌸</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Comic Sans MS',cursive,sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ffd6e7,#ffc0cb,#ffe5ec,#ffd1dc);
background-size:400% 400%;
animation:bg 10s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
background:rgba(255,255,255,.9);
padding:35px;
border-radius:30px;
box-shadow:0 10px 30px rgba(255,105,180,.3);
text-align:center;
position:relative;
z-index:5;
width:320px;
}

h1{
color:#ff4d88;
margin-bottom:20px;
}

p{
color:#ff5c8d;
font-size:20px;
}

button{
padding:12px 28px;
margin:10px;
font-size:18px;
border:none;
border-radius:50px;
cursor:pointer;
transition:.2s;
}

#yes{
background:#ff5c8d;
color:white;
}

#yes:hover{
transform:scale(1.08);
}

#no{
background:white;
color:#ff5c8d;
position:absolute;
border:2px solid #ff8fb1;
}

.heart{
position:fixed;
bottom:-30px;
font-size:25px;
animation:float linear forwards;
pointer-events:none;
}

@keyframes float{
0%{
transform:translateY(0) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(-110vh) rotate(360deg);
opacity:0;
}
}

#page2{
display:none;
animation:fade .8s;
}

@keyframes fade{
from{
opacity:0;
transform:scale(.8);
}
to{
opacity:1;
transform:scale(1);
}
}
</style>

</head>

<body>

<div class="card">

<div id="page1">
<h1>🌸 Are you cute? 🌸</h1>

<button id="yes">Yes 💕</button>
<button id="no">No 🙈</button>
</div>

<div id="page2">
<h1>🥺💖</h1>
<p>I knew it!!</p>
<p><b>You really are cute!! 🌸💕✨</b></p>
</div>

</div>

<script>

const no=document.getElementById("no");

function move(){

const x=Math.random()*(window.innerWidth-120);
const y=Math.random()*(window.innerHeight-70);

no.style.left=x+"px";
no.style.top=y+"px";
}

no.addEventListener("mouseover",move);

no.addEventListener("touchstart",e=>{
e.preventDefault();
move();
});

document.getElementById("yes").onclick=()=>{

document.getElementById("page1").style.display="none";
document.getElementById("page2").style.display="block";

setInterval(()=>{
let h=document.createElement("div");

h.className="heart";
h.innerHTML=Math.random()>0.5?"💖":"🌸";

h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(3+Math.random()*4)+"s";

document.body.appendChild(h);

setTimeout(()=>h.remove(),7000);

},150);

};

</script>

</body>
</html>
