<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 A Question 💕</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff7eb3,#ff758c,#ffb199,#ffd1dc);
background-size:400% 400%;
animation:bg 8s infinite alternate;
}

@keyframes bg{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

.card{
background:white;
padding:35px;
border-radius:25px;
text-align:center;
box-shadow:0 10px 35px rgba(0,0,0,.2);
position:relative;
z-index:2;
}

h1{
font-size:30px;
margin-bottom:20px;
}

button{
padding:12px 28px;
font-size:20px;
border:none;
border-radius:50px;
cursor:pointer;
margin:10px;
transition:.25s;
}

#yes{
background:#ff4f81;
color:white;
}

#yes:hover{
transform:scale(1.1);
}

#no{
background:#ddd;
position:absolute;
}

.heart{
position:fixed;
bottom:-20px;
font-size:24px;
animation:float 7s linear infinite;
pointer-events:none;
}

@keyframes float{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-110vh);
opacity:0;
}
}

#result{
display:none;
font-size:28px;
color:#ff2e63;
animation:pop .6s;
}

@keyframes pop{
from{transform:scale(.4);}
to{transform:scale(1);}
}
</style>

</head>

<body>

<div class="card">

<div id="question">
<h1>💖 Will you be my girlfriend? 💖</h1>

<button id="yes">Yes ❤️</button>
<button id="no">No 💔</button>
</div>

<div id="result">
<h1>YAY!! 🥳❤️</h1>
<p>You made me the happiest person ever! 💕</p>
</div>

</div>

<script>

const no=document.getElementById("no");

function moveButton(){
const x=Math.random()*(window.innerWidth-150);
const y=Math.random()*(window.innerHeight-80);

no.style.left=x+"px";
no.style.top=y+"px";
}

no.addEventListener("mouseover",moveButton);
no.addEventListener("touchstart",e=>{
e.preventDefault();
moveButton();
});

document.getElementById("yes").onclick=()=>{
document.getElementById("question").style.display="none";
document.getElementById("result").style.display="block";

for(let i=0;i<120;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML=Math.random()>0.5?"❤️":"💕";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(3+Math.random()*5)+"s";
document.body.appendChild(h);

setTimeout(()=>h.remove(),8000);
}
};

</script>

</body>
</html>
